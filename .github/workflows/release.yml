name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish release to GitHub'
        required: true
        default: true
        type: boolean
      skip_signing:
        description: 'Skip code signing (for testing)'
        required: false
        default: false
        type: boolean
      signing_method:
        description: 'Signing method for Windows (pfx, digicert, sectigo, azure)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - pfx
          - digicert
          - sectigo
          - azure

permissions:
  contents: write

env:
  # Python version for backend
  PYTHON_VERSION: '3.11'
  # Node version for frontend and electron
  NODE_VERSION: '22'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: windows-latest
            platform: win
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ========================================
      # Environment Setup
      # ========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # ========================================
      # Caching
      # ========================================
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PyInstaller
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pyinstaller
            ~/AppData/Local/pyinstaller
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('backend/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ./electron-cache
          key: ${{ runner.os }}-electron-${{ env.NODE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-electron-

      # ========================================
      # Dependencies Installation
      # ========================================
      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller

      # ========================================
      # Build Steps
      # ========================================
      - name: Build frontend (SvelteKit)
        run: npm run build:frontend
        env:
          NODE_ENV: production

      - name: Build backend executable
        run: npm run build:backend
        env:
          PYTHONOPTIMIZE: 1

      # ========================================
      # Code Signing Setup (macOS)
      # ========================================
      - name: Import Apple Certificate
        if: matrix.platform == 'mac' && github.event.inputs.skip_signing != 'true' && secrets.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain for code signing
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Import the Developer ID Application certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$CERTIFICATE_PATH"
          
          # Set the keychain as default for signing operations
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          
          # Enable codesigning access to the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Verify import
          security find-identity -v "$KEYCHAIN_PATH"
          
          # Store keychain path for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Verify Apple Certificate
        if: matrix.platform == 'mac' && github.event.inputs.skip_signing != 'true' && secrets.APPLE_CERTIFICATE_BASE64 != ''
        run: |
          echo "Installed signing identities:"
          security find-identity -v -p codesigning

      # ========================================
      # Code Signing Setup (Windows) - Traditional PFX
      # ========================================
      - name: Import Windows EV Certificate (PFX)
        if: matrix.platform == 'win' && github.event.inputs.skip_signing != 'true' && secrets.WIN_EV_CERTIFICATE_BASE64 != '' && secrets.CLOUD_SIGNING_SERVICE == ''
        env:
          WIN_EV_CERTIFICATE_BASE64: ${{ secrets.WIN_EV_CERTIFICATE_BASE64 }}
          WIN_EV_CERTIFICATE_PASSWORD: ${{ secrets.WIN_EV_CERTIFICATE_PASSWORD }}
        run: |
          # Create certificate file from base64 secret
          $CERT_PATH = "$env:RUNNER_TEMP\ev-certificate.pfx"
          [System.IO.File]::WriteAllBytes($CERT_PATH, [System.Convert]::FromBase64String("$env:WIN_EV_CERTIFICATE_BASE64"))
          
          # Set environment variables for electron-builder
          echo "WIN_CSC_LINK=$CERT_PATH" >> $env:GITHUB_ENV
          echo "WIN_CSC_KEY_PASSWORD=$env:WIN_EV_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
          
          # Verify certificate info (without exposing sensitive data)
          Write-Host "Certificate imported successfully (PFX mode)"

      # ========================================
      # Code Signing Setup (Windows) - Cloud Signing
      # ========================================
      - name: Configure Cloud Signing Service
        if: matrix.platform == 'win' && github.event.inputs.skip_signing != 'true'
        env:
          SECRET_CLOUD_SERVICE: ${{ secrets.CLOUD_SIGNING_SERVICE }}
          INPUT_SIGNING_METHOD: ${{ github.event.inputs.signing_method }}
        run: |
          # Determine which signing method to use
          $signingMethod = "${env:INPUT_SIGNING_METHOD}"
          
          if ($signingMethod -eq "auto" -or $signingMethod -eq "") {
            # Auto-detect based on available secrets
            if ("${{ secrets.CLOUD_SIGNING_SERVICE }}" -ne "") {
              $signingMethod = "${{ secrets.CLOUD_SIGNING_SERVICE }}"
            } elseif ("${{ secrets.WIN_EV_CERTIFICATE_BASE64 }}" -ne "") {
              $signingMethod = "pfx"
            } else {
              Write-Host "No signing credentials configured, skipping signing"
              echo "SKIP_WINDOWS_SIGNING=true" >> $env:GITHUB_ENV
              return
            }
          }
          
          Write-Host "Using signing method: $signingMethod"
          
          if ($signingMethod -eq "pfx") {
            # Traditional PFX signing (handled in next step)
            Write-Host "PFX signing will be configured in next step"
          } else {
            # Cloud signing
            echo "CLOUD_SIGNING_SERVICE=$signingMethod" >> $env:GITHUB_ENV
            echo "USE_CLOUD_SIGNING=true" >> $env:GITHUB_ENV
            Write-Host "Cloud signing configured for: $signingMethod"
          }

      - name: Install Cloud Signing Dependencies
        if: matrix.platform == 'win' && env.USE_CLOUD_SIGNING == 'true'
        run: |
          # Install otplib for TOTP generation (required for DigiCert)
          npm install --no-save otplib
          
          # Install AzureSignTool if using Azure Key Vault
          if ("$env:CLOUD_SIGNING_SERVICE" -eq "azure") {
            Write-Host "Installing AzureSignTool..."
            dotnet tool install --tool-path ./tools/azuresigntool AzureSignTool --version 3.0.0
          }
          
          # Download CodeSignTool for DigiCert/Sectigo
          if ("$env:CLOUD_SIGNING_SERVICE" -eq "digicert" -or "$env:CLOUD_SIGNING_SERVICE" -eq "sectigo") {
            Write-Host "CodeSignTool will be downloaded on first use by cloud-sign.js"
          }
          
          Write-Host "Cloud signing dependencies installed"

      - name: Install Windows SDK Signing Tools
        if: matrix.platform == 'win' && github.event.inputs.skip_signing != 'true'
        run: |
          # Windows SDK with signtool should be pre-installed on windows-latest
          # Verify signtool is available
          $SIGNTOOL_PATH = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          if (Test-Path $SIGNTOOL_PATH) {
            Write-Host "signtool found at: $SIGNTOOL_PATH"
            echo "SIGNTOOL_PATH=$SIGNTOOL_PATH" >> $env:GITHUB_ENV
          } else {
            Write-Host "signtool not found at expected path, searching..."
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter "signtool.exe" | ForEach-Object {
              Write-Host "Found: $($_.FullName)"
            }
          }

      # ========================================
      # Electron Build
      # ========================================
      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Developer ID Application)
          CSC_LINK: ${{ github.event.inputs.skip_signing == 'true' && '' || secrets.APPLE_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ github.event.inputs.skip_signing == 'true' && '' || secrets.APPLE_CERTIFICATE_PASSWORD }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing - PFX (traditional)
          WIN_CSC_LINK: ${{ env.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ env.WIN_CSC_KEY_PASSWORD }}
          # Windows code signing - Cloud services
          USE_CLOUD_SIGNING: ${{ env.USE_CLOUD_SIGNING }}
          CLOUD_SIGNING_SERVICE: ${{ env.CLOUD_SIGNING_SERVICE }}
          # DigiCert eSigner
          DIGICERT_USERNAME: ${{ secrets.DIGICERT_USERNAME }}
          DIGICERT_PASSWORD: ${{ secrets.DIGICERT_PASSWORD }}
          DIGICERT_API_KEY: ${{ secrets.DIGICERT_API_KEY }}
          DIGICERT_OTP_SECRET: ${{ secrets.DIGICERT_OTP_SECRET }}
          CLOUD_CERT_ALIAS: ${{ secrets.CLOUD_CERT_ALIAS }}
          # Sectigo CodeSigner
          SECTIGO_USERNAME: ${{ secrets.SECTIGO_USERNAME }}
          SECTIGO_PASSWORD: ${{ secrets.SECTIGO_PASSWORD }}
          SECTIGO_CLIENT_ID: ${{ secrets.SECTIGO_CLIENT_ID }}
          SECTIGO_CLIENT_SECRET: ${{ secrets.SECTIGO_CLIENT_SECRET }}
          CLOUD_CREDENTIAL_ID: ${{ secrets.CLOUD_CREDENTIAL_ID }}
          # Azure Key Vault
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          AZURE_CERTIFICATE_NAME: ${{ secrets.AZURE_CERTIFICATE_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # Build options
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          npx electron-builder --publish never --${{ matrix.arch }}

      # ========================================
      # Verify Signing (macOS)
      # ========================================
      - name: Verify macOS Code Signing
        if: matrix.platform == 'mac' && github.event.inputs.skip_signing != 'true' && secrets.APPLE_CERTIFICATE_BASE64 != ''
        run: |
          # Find and verify signed app
          APP_PATH=$(find release -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Verifying signature for: $APP_PATH"
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            codesign -dvv "$APP_PATH"
          fi

      # ========================================
      # Verify Signing (Windows)
      # ========================================
      - name: Verify Windows Code Signing
        if: matrix.platform == 'win' && github.event.inputs.skip_signing != 'true' && (env.WIN_CSC_LINK != '' || env.USE_CLOUD_SIGNING == 'true')
        run: |
          # Find and verify signed executable
          $EXE_PATH = Get-ChildItem -Path release -Filter "*.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if ($EXE_PATH) {
            Write-Host "Verifying signature for: $EXE_PATH"
            $SIGTOOL = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
            if (Test-Path $SIGTOOL) {
              & $SIGTOOL verify /pa /all $EXE_PATH
            } else {
              # Fallback to PowerShell signature check
              $sig = Get-AuthenticodeSignature $EXE_PATH
              Write-Host "Signature Status: $($sig.Status)"
              Write-Host "Signer Certificate: $($sig.SignerCertificate.Subject)"
            }
          } else {
            Write-Host "No .exe file found to verify"
          }

      # ========================================
      # Cleanup Signing Artifacts
      # ========================================
      - name: Cleanup macOS signing artifacts
        if: matrix.platform == 'mac' && always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          # Remove any temporary certificate files
          rm -f $RUNNER_TEMP/certificate.p12 2>/dev/null || true

      - name: Cleanup Windows signing artifacts
        if: matrix.platform == 'win' && always()
        run: |
          Remove-Item -Path "$env:RUNNER_TEMP\ev-certificate.pfx" -Force -ErrorAction SilentlyContinue

      # ========================================
      # Upload Artifacts
      # ========================================
      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ashwen-${{ matrix.arch }}-windows
          path: |
            release/*.exe
            release/*.yml
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: ashwen-${{ matrix.arch }}-macos
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
          retention-days: 30

  # ========================================
  # Publish Release
  # ========================================
  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Release
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: ashwen-*
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========================================
  # Notify on Failure
  # ========================================
  notify-failure:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    name: Notify on Failure

    steps:
      - name: Notify on build failure
        run: |
          echo "::error::Build failed for one or more platforms"
          # Add webhook notification here if needed
          # curl -X POST -H 'Content-type: application/json' --data '{"text":"Ashwen build failed"}' ${{ secrets.SLACK_WEBHOOK_URL }}
